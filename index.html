<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="./js/script.js" defer></script>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
  <title>Odin | Etch-A-Sketch</title>
</head>
<body>
  <section class="header container">
    <h1 class="header-title">Etch-A-Sketch</h1>

    <div class="header-form">
      <div class="header-form-container">
        <label for="grid-size">Grid size: 16 x 16</label>
        <input type="range" step="2" min="16" max="60" value="16" data-value="16" id="grid-size" class="header-slider">
      </div>
      <button class="header-button">reset</button>
    </div>
  </section>
  <section class="grid-wrapper container"></section>
</body>
</html>
